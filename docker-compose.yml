version: '3.8'

services:
  rifas:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/database/rifas.db
      NODE_ENV: production
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - rifas-data:/app/database
      - rifas-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  rifas-data:
  rifas-uploads:
