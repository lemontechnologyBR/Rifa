<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexão | VouRifar</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      color: #334155;
      padding: 1.5rem;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; color: #0f172a; }
    p { margin: 0 0 1rem; font-size: 0.9375rem; line-height: 1.5; }
    button {
      border: 0;
      border-radius: 9999px;
      padding: 0.75rem 1.25rem;
      background: #10b981;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <h1>Você está offline</h1>
    <p>Verifique sua internet e tente novamente.</p>
    <button type="button" onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
